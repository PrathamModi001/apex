version: '3.9'

services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: apex-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: apex-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: ["rpk --brokers redpanda:29092 topic create invoice.raw invoice.processed invoice.decision invoice.action invoice.dlq --partitions 2 --replicas 1 || true"]
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: apex-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apex}
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: apex-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: apex-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/apex_neo4j_secret}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 15

  minio:
    image: minio/minio:latest
    container_name: apex-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-apex_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-apex_minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: apex-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["mc alias set apex http://minio:9000 ${MINIO_ROOT_USER:-apex_minio} ${MINIO_ROOT_PASSWORD:-apex_minio_secret} && mc mb apex/invoices --ignore-existing"]
    restart: "no"

volumes:
  postgres_data:
  neo4j_data:
  minio_data:
